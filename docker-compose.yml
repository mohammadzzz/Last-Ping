services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: lastping
      POSTGRES_USER: lastping
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lastping}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lastping -d lastping"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lastping:${POSTGRES_PASSWORD:-lastping}@db:5432/lastping?schema=public
      DATA_DIR: /data
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./data/files:/data/files
      - ./data/tmp:/data/tmp

  # One-shot image that keeps dev deps + source so `tsx scripts/*.ts` works.
  # Use with: `docker compose run --rm tools npm run bootstrap`.
  tools:
    build:
      context: .
      target: builder
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://lastping:${POSTGRES_PASSWORD:-lastping}@db:5432/lastping?schema=public
      DATA_DIR: /data
    volumes:
      - ./data/files:/data/files
      - ./data/tmp:/data/tmp
    profiles: ["tools"]
    command: ["node", "-e", "console.log('Use: docker compose --profile tools run --rm tools npm run bootstrap')"]
